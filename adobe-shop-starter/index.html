    <script>
      window.waitForAlloyReady = async function (timeoutMs = 8000) {
        const started = Date.now();

        while (typeof window.alloy !== "function") {
          if (Date.now() - started > timeoutMs) {
            throw new Error("alloy did not become available in time");
          }
          await new Promise((resolve) => setTimeout(resolve, 50));
        }

        while (Date.now() - started <= timeoutMs) {
          try {
            await window.alloy("getLibraryInfo");
            return window.alloy;
          } catch (e) {
            await new Promise((resolve) => setTimeout(resolve, 100));
          }
        }

        throw new Error("alloy exists but is not ready in time");
      };
